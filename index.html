<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Level Booking CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-100 text-sm">

<!-- SIDEBAR -->
<div class="w-64 bg-black text-white p-5 flex flex-col">
  <h2 class="text-xl font-bold mb-8">Booking CRM</h2>

  <button class="text-left mb-3 hover:text-blue-400" onclick="navigate('dashboard')">📊 Dashboard</button>
  <button class="text-left mb-3 hover:text-blue-400" onclick="navigate('clients')">👥 Clients</button>

  <div class="mt-auto text-xs text-gray-400">Investor Demo UI</div>
</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-y-auto">

<!-- DASHBOARD -->
<div id="dashboardPage">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold">Bookings Dashboard</h1>
      <p class="text-gray-500">Real-time booking lifecycle management</p>
    </div>

    <div class="flex gap-2">
      <input id="search" onkeyup="render()" placeholder="Search client or property..." class="border p-2 rounded w-64" />
      <select id="filter" onchange="render()" class="border p-2 rounded">
        <option value="all">All</option>
        <option value="Pending">Pending Approval</option>
        <option value="Confirmed">Confirmed</option>
        <option value="Deposit Paid">Deposit Paid</option>
        <option value="Final Invoice Sent">Final Invoice Sent</option>
        <option value="Fully Paid">Fully Paid</option>
      </select>
    </div>
  </div>

  <!-- KPI -->
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow"><p>Total Bookings</p><h2 id="kpiTotal" class="text-2xl font-bold"></h2></div>
    <div class="bg-white p-4 rounded shadow"><p>Pending</p><h2 id="kpiPending" class="text-2xl font-bold"></h2></div>
    <div class="bg-white p-4 rounded shadow"><p>Deposits</p><h2 id="kpiDeposit" class="text-2xl font-bold"></h2></div>
    <div class="bg-white p-4 rounded shadow"><p>Revenue</p><h2 id="kpiRevenue" class="text-2xl font-bold"></h2></div>
  </div>

  <!-- TABLE -->
  <div class="bg-white rounded-xl shadow overflow-x-auto">
    <table class="w-full min-w-[1200px]">
      <thead class="bg-gray-100 text-left">
        <tr>
          <th class="p-3">Client</th>
          <th class="p-3">Property</th>
          <th class="p-3">Check-in / Check-out</th>
          <th class="p-3">Request Date</th>
          <th class="p-3">Status</th>
          <th class="p-3">Deposit</th>
          <th class="p-3">Final</th>
          <th class="p-3">Action</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<!-- CLIENTS -->
<div id="clientsPage" class="hidden">
  <h1 class="text-2xl font-bold mb-4">Clients</h1>
  <div id="clientsList" class="grid gap-3"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4">
  <div class="bg-white w-full max-w-2xl rounded-xl p-6">
    <div id="modalContent"></div>
    <button onclick="closeModal()" class="mt-4 bg-black text-white px-4 py-2 rounded">Close</button>
  </div>
</div>

<script>

let bookings = JSON.parse(localStorage.getItem("bookings")) || [
  {
    id: 1,
    name: "Emily Carter",
    email: "emily@example.com",
    contact: "081 555 3322",
    property: "Ocean View Villa",
    requestDate: "2026-04-01",
    startDate: "2026-05-10",
    endDate: "2026-05-20",
    status: "Pending",
    stage: "Pending",
    deposit: 0,
    final: 0,
    amount: 15000,
    notes: "Awaiting approval"
  },
  {
    id: 2,
    name: "James Smith",
    email: "james@example.com",
    contact: "082 444 9988",
    property: "Mountain Retreat",
    requestDate: "2026-03-20",
    startDate: "2026-04-15",
    endDate: "2026-04-25",
    status: "Deposit Paid",
    stage: "Deposit Paid",
    deposit: 1,
    final: 0,
    amount: 22000,
    notes: "Awaiting final invoice"
  },
  {
    id: 3,
    name: "Sophie Williams",
    email: "sophie@example.com",
    contact: "083 111 2233",
    property: "Beach House Cape Town",
    requestDate: "2026-02-10",
    startDate: "2026-03-01",
    endDate: "2026-03-10",
    status: "Fully Paid",
    stage: "Fully Paid",
    deposit: 1,
    final: 1,
    amount: 18000,
    notes: "Send check-in details"
  }
];

let current;

function navigate(page){
  dashboardPage.classList.add("hidden");
  clientsPage.classList.add("hidden");
  if(page === "dashboard") dashboardPage.classList.remove("hidden");
  if(page === "clients") clientsPage.classList.remove("hidden");
  render();
}

function save(){
  localStorage.setItem("bookings", JSON.stringify(bookings));
  render();
}

function render(){

  let search = document.getElementById("search")?.value?.toLowerCase() || "";
  let filter = document.getElementById("filter")?.value || "all";

  let filtered = bookings.filter(b => {
    return (b.name.toLowerCase().includes(search) || b.property.toLowerCase().includes(search)) &&
           (filter === "all" || b.stage === filter);
  });

  table.innerHTML = "";
  clientsList.innerHTML = "";

  kpiTotal.innerText = bookings.length;
  kpiPending.innerText = bookings.filter(b => b.stage === "Pending").length;
  kpiDeposit.innerText = bookings.filter(b => b.deposit > 0).length;
  kpiRevenue.innerText = "R " + bookings.reduce((a,b)=>a + (b.final ? b.amount : b.deposit ? b.amount/2 : 0),0);

  filtered.forEach(b => {

    table.innerHTML += `
      <tr class="hover:bg-gray-50 border-b">
        <td class="p-3 font-semibold">${b.name}</td>
        <td class="p-3">${b.property}</td>
        <td class="p-3">${b.startDate} → ${b.endDate}</td>
        <td class="p-3">${b.requestDate}</td>
        <td class="p-3"><span class="px-2 py-1 rounded text-xs bg-gray-200">${b.stage}</span></td>
        <td class="p-3">${b.deposit ? "50% Paid" : "R0"}</td>
        <td class="p-3">${b.final ? "Paid" : "R0"}</td>
        <td class="p-3"><button onclick="openBooking(${b.id})" class="bg-blue-600 text-white px-3 py-1 rounded">View</button></td>
      </tr>
    `;

    clientsList.innerHTML += `
      <div onclick="openBooking(${b.id})" class="bg-white p-4 rounded shadow hover:shadow-lg cursor-pointer">
        <div class="font-bold">${b.name}</div>
        <div class="text-gray-500">${b.email}</div>
      </div>
    `;

  });
}

function openBooking(id){

  current = id;
  let b = bookings.find(x => x.id === id);

  modal.classList.remove("hidden");

  let actions = "";

  if(b.stage === "Pending"){
    actions = `<button onclick="updateStage('Confirmed')" class="bg-green-600 text-white px-3 py-1 rounded">Approve + Send Confirmation & Deposit Invoice</button>`;
  }

  if(b.stage === "Confirmed"){
    actions = `<button onclick="updateStage('Deposit Paid')" class="bg-yellow-500 text-white px-3 py-1 rounded">Mark Deposit Paid</button>`;
  }

  if(b.stage === "Deposit Paid"){
    actions = `<button onclick="updateStage('Final Invoice Sent')" class="bg-blue-600 text-white px-3 py-1 rounded">Send Final Invoice</button>`;
  }

  if(b.stage === "Final Invoice Sent"){
    actions = `<button onclick="updateStage('Fully Paid')" class="bg-purple-600 text-white px-3 py-1 rounded">Mark Fully Paid + Send Check-in Email</button>`;
  }

  modalContent.innerHTML = `
    <h2 class="text-2xl font-bold mb-3">Booking Lifecycle</h2>

    <div class="grid grid-cols-2 gap-2 text-sm">
      <p><b>Client:</b> ${b.name}</p>
      <p><b>Email:</b> ${b.email}</p>
      <p><b>Contact:</b> ${b.contact}</p>
      <p><b>Property:</b> ${b.property}</p>
      <p><b>Request Date:</b> ${b.requestDate}</p>
      <p><b>Check-in:</b> ${b.startDate}</p>
      <p><b>Check-out:</b> ${b.endDate}</p>
      <p><b>Total:</b> R${b.amount}</p>
      <p><b>Stage:</b> ${b.stage}</p>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      ${actions}
    </div>

    <textarea id="note" class="w-full border p-2 mt-4 rounded">${b.notes}</textarea>
    <button onclick="saveNote()" class="mt-2 bg-black text-white px-4 py-2 rounded">Save Note</button>
  `;
}

function updateStage(stage){
  bookings = bookings.map(b => b.id === current ? {...b, stage, status: stage, deposit: stage === 'Confirmed' ? 1 : b.deposit, final: stage === 'Fully Paid' ? 1 : b.final} : b);
  save();
  openBooking(current);
}

function saveNote(){
  let b = bookings.find(x => x.id === current);
  b.notes = document.getElementById("note").value;
  save();
}

function closeModal(){ modal.classList.add("hidden"); }

render();

</script>
</body>
</html>
