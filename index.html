<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full SaaS CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-100">

<!-- Sidebar -->
<div class="w-64 bg-black text-white p-4">
  <h2 class="text-xl font-bold mb-6">CRM</h2>
  <ul>
    <li class="mb-3 cursor-pointer" onclick="navigate('dashboard')">Dashboard</li>
    <li class="mb-3 cursor-pointer" onclick="navigate('bookings')">Bookings</li>
    <li class="mb-3 cursor-pointer" onclick="navigate('clients')">Clients</li>
  </ul>
</div>

<!-- Main -->
<div class="flex-1 p-6 overflow-y-auto">

<!-- Dashboard -->
<div id="dashboardPage">
  <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
  <div class="grid grid-cols-3 gap-4">
    <div class="bg-white p-4 rounded">Total: <span id="total"></span></div>
    <div class="bg-white p-4 rounded">Pending: <span id="pending"></span></div>
    <div class="bg-white p-4 rounded">Revenue: <span id="revenue"></span></div>
  </div>
</div>

<!-- Bookings -->
<div id="bookingsPage" class="hidden">
  <h1 class="text-2xl font-bold mb-4">Bookings</h1>

  <button onclick="simulateBooking()" class="bg-blue-600 text-white px-4 py-2 mb-4 rounded">+ Simulate Website Booking</button>

  <table class="w-full bg-white">
    <thead>
      <tr><th>Name</th><th>Property</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<!-- Clients -->
<div id="clientsPage" class="hidden">
  <h1 class="text-2xl font-bold mb-4">Clients</h1>
  <div id="clientsList" class="space-y-2"></div>
</div>

</div>

<!-- Booking Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
<div class="bg-white p-6 w-96 rounded">
<div id="modalContent"></div>
<button onclick="closeModal()" class="mt-4 bg-black text-white px-3 py-1">Close</button>
</div>
</div>

<!-- Client Modal -->
<div id="clientModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
<div class="bg-white p-6 w-96 rounded">
<div id="clientContent"></div>
<button onclick="closeClientModal()" class="mt-4 bg-black text-white px-3 py-1">Close</button>
</div>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("bookings")) || [
  {
    id:1,
    name:"Emily Carter",
    email:"emily@example.com",
    contact:"081 555 3322",
    property:"Ocean View Villa",
    date:"2026-05-10",
    status:"Pending",
    deposit:false,
    full:false,
    amount:15000,
    notes:"Requested early check-in",
    chat:["Hi, I would like to book","Sure, awaiting confirmation"]
  }
];

let current;
let currentClient;

function navigate(page){
  dashboardPage.classList.add("hidden");
  bookingsPage.classList.add("hidden");
  clientsPage.classList.add("hidden");

  if(page=="dashboard") dashboardPage.classList.remove("hidden");
  if(page=="bookings") bookingsPage.classList.remove("hidden");
  if(page=="clients") clientsPage.classList.remove("hidden");
}

function save(){localStorage.setItem("bookings",JSON.stringify(bookings));render();}

function simulateBooking(){
  bookings.push({
    id:Date.now(),
    name:"New Website Client",
    email:"client@demo.com",
    contact:"072 111 2222",
    property:"Mountain Retreat",
    date:"2026-05-15",
    status:"Pending",
    deposit:false,
    full:false,
    amount:10000,
    notes:"Auto-generated booking",
    chat:["Booking request submitted"]
  });
  save();
}

function render(){
  table.innerHTML="";
  clientsList.innerHTML="";

  bookings.forEach(b=>{
    let locked=b.full?"disabled opacity-50":"";

    table.innerHTML+=`<tr>
      <td>${b.name}</td>
      <td>${b.property}</td>
      <td>${b.status}</td>
      <td>
        <button onclick="view(${b.id})">View</button>
        <button ${locked} onclick="approve(${b.id})">✔</button>
        <button ${locked} onclick="deposit(${b.id})">50%</button>
        <button ${locked} onclick="full(${b.id})">100%</button>
      </td>
    </tr>`;

    clientsList.innerHTML+=`
      <div onclick="viewClient(${b.id})" class="bg-white p-3 cursor-pointer hover:bg-gray-200 rounded">
        <p class="font-bold">${b.name}</p>
        <p class="text-sm text-gray-600">${b.email}</p>
      </div>
    `;
  });

  total.innerText=bookings.length;
  pending.innerText=bookings.filter(b=>b.status=="Pending").length;
  revenue.innerText="R"+bookings.filter(b=>b.full).reduce((a,b)=>a+b.amount,0);
}

function approve(id){update(id,{status:"Confirmed"});}
function deposit(id){update(id,{deposit:true,status:"Deposit Paid"});}
function full(id){update(id,{full:true,status:"Fully Paid"});}

function update(id,fields){bookings=bookings.map(b=>b.id==id?{...b,...fields}:b);save();}

function view(id){
  current=id;
  let b=bookings.find(x=>x.id==id);
  modal.classList.remove("hidden");

  let actionButton = b.full
    ? `<button onclick="alert('Check-in email sent')" class="bg-purple-600 text-white px-2 py-1 mt-2">Send Check-in Email</button>`
    : `<button onclick="alert('Invoice sent')" class="bg-green-500 text-white px-2 py-1 mt-2">Send Invoice</button>`;

  modalContent.innerHTML=`
    <h2 class="font-bold text-lg">${b.name}</h2>
    <p>${b.email}</p>
    <p>${b.contact}</p>
    <p>Status: ${b.status}</p>

    <div class="border p-2 mt-2">
      <h3 class="font-bold">Invoice</h3>
      <p>Deposit: R${b.amount*0.5}</p>
      <p>Balance: R${b.amount*0.5}</p>
      ${actionButton}
    </div>

    <textarea id="note" class="border w-full mt-2">${b.notes}</textarea>
    <button onclick="saveNote()" class="bg-black text-white px-2 py-1 mt-1">Save Note</button>

    <div class="mt-2">
      <h3 class="font-bold">Chat</h3>
      <div id="chatBox" class="border h-24 overflow-y-auto mb-1"></div>
      <input id="chatInput" class="border w-full" placeholder="Message">
      <button onclick="sendChat()" class="bg-blue-500 text-white px-2 py-1 mt-1">Send</button>
    </div>
  `;

  chatBox.innerHTML=b.chat.map(m=>`<div>${m}</div>`).join("");
}

function viewClient(id){
  currentClient=id;
  let b=bookings.find(x=>x.id==id);
  clientModal.classList.remove("hidden");

  clientContent.innerHTML=`
    <h2 class="font-bold text-lg">Client Profile</h2>
    <p><b>Name:</b> ${b.name}</p>
    <p><b>Email:</b> ${b.email}</p>
    <p><b>Contact:</b> ${b.contact}</p>
    <p><b>Property:</b> ${b.property}</p>
    <p><b>Status:</b> ${b.status}</p>
    <p><b>Total Paid:</b> R${b.full ? b.amount : (b.deposit ? b.amount*0.5 : 0)}</p>
  `;
}

function closeModal(){modal.classList.add("hidden");}
function closeClientModal(){clientModal.classList.add("hidden");}
function saveNote(){update(current,{notes:note.value});}

function sendChat(){
  let msg=chatInput.value;
  bookings=bookings.map(b=>{
    if(b.id==current){b.chat.push(msg);}return b;
  });
  chatInput.value="";
  save();
  view(current);
}

render();
</script>

</body>
</html>
